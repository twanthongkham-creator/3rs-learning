<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3Rs Learning Gateway</title>
  <style>
    :root{
      --green:#0f766e;
      --green-2:#14b8a6;
      --blue:#1d4ed8;
      --blue-2:#2563eb;
      --orange:#f59e0b;
      --bg:#f4f8fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe5ef;
      --success:#16a34a;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 25%),
        radial-gradient(circle at top left, rgba(20,184,166,.10), transparent 30%),
        var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:12px auto;
      padding:0 10px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(219,229,239,.8);
      border-radius:18px;
      box-shadow:0 8px 20px rgba(15,23,42,.08);
      overflow:hidden;
    }

    .hero{
      padding:16px 16px 10px;
      background:linear-gradient(135deg, rgba(20,184,166,.12), rgba(37,99,235,.10));
      border-bottom:1px solid var(--line);
    }

    .eyebrow{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.75);
      color:var(--green);
      font-weight:700;
      font-size:12px;
      margin-bottom:8px;
    }

    .hero h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
      color:var(--green);
    }

    .hero p{
      margin:6px 0 0;
      color:#334155;
      font-size:14px;
      line-height:1.5;
    }

    .content{
      padding:14px 16px 18px;
    }

    .note{
      margin-top:4px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid #bfdbfe;
      background:#eff6ff;
      color:#1e3a8a;
      font-size:13px;
      line-height:1.5;
    }

    .video-area{
      margin-top:14px;
    }

    .section-title{
      margin:0 0 8px;
      font-size:17px;
      font-weight:800;
      color:#0f172a;
    }

    .video-shell{
      background:#000;
      border-radius:16px;
      overflow:hidden;
      position:relative;
      box-shadow:0 6px 18px rgba(2,6,23,.14);
    }

    video{
      width:100%;
      display:block;
      background:#000;
      pointer-events:none;
    }

    video::-webkit-media-controls{
      display:none !important;
    }

    video::-webkit-media-controls-enclosure{
      display:none !important;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(2,6,23,.35), rgba(2,6,23,.55));
    }

    .start-btn{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-size:15px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg, var(--orange), #fb923c);
      cursor:pointer;
      box-shadow:0 8px 24px rgba(245,158,11,.35);
    }

    .progress-box{
      margin-top:12px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#f8fafc;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
      color:#334155;
    }

    .bar{
      width:100%;
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:#e5e7eb;
    }

    .bar-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, var(--green-2), var(--blue-2));
      transition:width .2s ease;
    }

    .status{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }

    .action{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:stretch;
    }

    .quiz-btn{
      border:none;
      padding:14px 18px;
      width:100%;
      border-radius:14px;
      font-size:15px;
      font-weight:800;
      color:#fff;
      background:#9ca3af;
      cursor:not-allowed;
      transition:.2s ease;
    }

    .quiz-btn.enabled{
      background:linear-gradient(135deg, var(--success), #22c55e);
      cursor:pointer;
      box-shadow:0 8px 24px rgba(34,197,94,.28);
    }

    .pill{
      text-align:center;
      padding:7px 10px;
      border-radius:999px;
      background:#f1f5f9;
      color:#475569;
      font-size:12px;
      font-weight:700;
    }

    .footer{
      margin-top:12px;
      color:#64748b;
      font-size:12px;
      text-align:center;
    }

    @media (min-width:769px){
      .wrap{
        margin:20px auto;
      }
      .hero{
        padding:20px 20px 12px;
      }
      .content{
        padding:18px 20px 22px;
      }
      .hero h1{
        font-size:30px;
      }
      .action{
        flex-direction:row;
        align-items:center;
      }
      .quiz-btn{
        width:auto;
        min-width:250px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="eyebrow">Sermsuk Pathumthani Plant</div>
        <h1>3Rs การจัดการขยะ</h1>
        <p>ดูวิดีโอให้จบ แล้วค่อยเริ่มทำแบบทดสอบ</p>
      </div>

      <div class="content">
        <div class="note">
          ปุ่มแบบทดสอบจะเปิดอัตโนมัติเมื่อวิดีโอเล่นจบ
        </div>

        <div class="video-area">
          <div class="section-title">วิดีโออบรม</div>

          <div class="video-shell">
            <video id="trainingVideo" preload="metadata" playsinline disablePictureInPicture muted>
              <source src="3rs.mp4" type="video/mp4" />
              เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
            </video>

            <div class="overlay" id="videoOverlay">
              <button class="start-btn" id="startBtn">เริ่มรับชมวิดีโอ</button>
            </div>
          </div>

          <div class="progress-box">
            <div class="progress-top">
              <span>ความคืบหน้า</span>
              <span id="progressText">0%</span>
            </div>

            <div class="bar">
              <div class="bar-fill" id="progressFill"></div>
            </div>

            <div class="status" id="statusText">
              กรุณารับชมวิดีโอให้จบ
            </div>
          </div>

          <div class="action">
            <button class="quiz-btn" id="quizBtn" disabled>เริ่มทำแบบทดสอบ</button>
            <div class="pill">เกณฑ์ผ่าน 6/8 คะแนน</div>
          </div>
        </div>

        <div class="footer">
          3Rs Learning Gateway | Zero Waste To Landfill
        </div>
      </div>
    </div>
  </div>

  <script>
    const FORM_LINK = "https://forms.office.com/Pages/ResponsePage.aspx?id=2LdF7RbeRUCDeJ8F2zVz_MU5jhlvSHJFrvUX1CJec11UMDVVQVVNOVRKQlBHT043TFpYM1pLMzg0Ny4u&lang=th-TH";

    const video = document.getElementById("trainingVideo");
    const startBtn = document.getElementById("startBtn");
    const videoOverlay = document.getElementById("videoOverlay");
    const quizBtn = document.getElementById("quizBtn");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const statusText = document.getElementById("statusText");

    let maxWatchedTime = 0;
    let videoCompleted = false;
    let isStarted = false;

    video.controls = false;

    startBtn.addEventListener("click", async () => {
  isStarted = true;
  videoOverlay.style.display = "none";
  video.muted = false; // unmute หลัง user กด

  try {
    await video.play();
  } catch (err) {
    alert("ไม่สามารถเล่นวิดีโอได้ กรุณาตรวจสอบไฟล์วิดีโอ");
    console.error(err);
  }
});

    video.addEventListener("timeupdate", () => {
      if (video.currentTime > maxWatchedTime) {
        maxWatchedTime = video.currentTime;
      }

      if (video.duration) {
        const percent = Math.min((video.currentTime / video.duration) * 100, 100);
        progressFill.style.width = percent + "%";
        progressText.textContent = Math.floor(percent) + "%";
      }
    });

    video.addEventListener("seeking", () => {
      if (video.currentTime > maxWatchedTime + 0.2) {
        video.currentTime = maxWatchedTime;
      }
    });

    video.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });

    document.addEventListener("keydown", (e) => {
      const blockedKeys = [
        " ",
        "Spacebar",
        "ArrowLeft",
        "ArrowRight",
        "ArrowUp",
        "ArrowDown",
        "Home",
        "End",
        "PageUp",
        "PageDown"
      ];

      if (blockedKeys.includes(e.key)) {
        e.preventDefault();
      }
    });

    video.addEventListener("pause", async () => {
      if (!videoCompleted && isStarted && !video.ended) {
        try {
          await video.play();
        } catch (err) {
          console.error(err);
        }
      }
    });

    video.addEventListener("ended", () => {
      videoCompleted = true;
      progressFill.style.width = "100%";
      progressText.textContent = "100%";
      statusText.textContent = "รับชมครบแล้ว สามารถเริ่มทำแบบทดสอบได้";
      quizBtn.disabled = false;
      quizBtn.classList.add("enabled");
    });

    quizBtn.addEventListener("click", () => {
      if (!videoCompleted) return;
      window.location.href = FORM_LINK;
    });
  </script>
</body>
</html>
